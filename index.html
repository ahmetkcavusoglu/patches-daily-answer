<style>
  :root {
    --bg: #f5f5f0;
    --panel: #ffffff;
    --border: #e0e0d8;
    --accent: #2563eb;
    --text: #1a1a1a;
    --muted: #9a9a9a;
    --ad-bg: #efefeb;
    --ad-border: #d8d8d0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }

  /* ══ LAYOUT ══ */
  .page {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 160px 1fr 160px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header  header  header"
      "ad-left main    ad-right"
      "footer  footer  footer";
    min-height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ══ HEADER ══ */
  header {
    grid-area: header;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 0;
    gap: 12px;
  }

  .ad-top {
    width: 100%;
    max-width: 728px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 90px;
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
    margin-top: 10px;
  }

  .site-sub {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .header-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  /* ══ SIDEBAR ADS ══ */
  .ad-sidebar {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 28px 8px;
  }
  .ad-left  { grid-area: ad-left; }
  .ad-right { grid-area: ad-right; }

  .ad-sidebar-box {
    width: 160px;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ══ MAIN ══ */
  main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    gap: 20px;
  }

  /* Mobile top ad (hidden on desktop) */
.ad-mobile-top {
    display: none;
    width: 100%;
    max-width: 320px;
    height: 50px;
    min-height: 50px;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .answer-card {
    width: 100%;
    max-width: 600px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .answer-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #fafaf8;
  }

  .answer-card-header .label {
    font-size: 0.63rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .answer-card-header .date {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .answer-img-wrap {
    width: 100%;
    background: #f8f8f6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
  }

  .answer-img-wrap img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
  }

.ad-mid {
    width: 100%;
    max-width: 468px;
    height: 60px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Mobile bottom ad (hidden on desktop) */
.ad-mobile-bottom {
    display: none;
    width: 100%;
    max-width: 320px;
    height: 50px;
    min-height: 50px;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ══ SHARE ══ */
  .share-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .share-label {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .share-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 14px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .share-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(37,99,235,0.05); }
  .share-btn.twitter:hover  { color: #000; border-color: #000; background: rgba(0,0,0,0.04); }
  .share-btn.linkedin:hover { color: #0077b5; border-color: #0077b5; background: rgba(0,119,181,0.05); }

  /* ══ FOOTER ══ */
  footer {
    grid-area: footer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
    background: #fafaf8;
  }

  .ad-bottom {
    width: 100%;
    max-width: 728px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-text {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ══ RESPONSIVE / MOBILE ══ */
  @media (max-width: 700px) {
    .page {
      grid-template-columns: 1fr;
      grid-template-areas: "header" "main" "footer";
    }
    .ad-left, .ad-right { display: none; }
    .ad-top { min-height: 50px; }
    .ad-bottom { min-height: 50px; }
    .ad-mobile-top, .ad-mobile-bottom { display: flex; }
    .ad-mid { max-width: 320px; }
  }
</style>
